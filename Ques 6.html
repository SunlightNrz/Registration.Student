<html>
<head>
    <title>Student Records</title>
</head>
<body style="font-family: Arial, sans-serif;">
    <center>
        <br>
        <table border="1" style="width: 90%; border-collapse: collapse; text-align: center;">
            <tr style="background-color:lightpink;">
                <th width="5%">Sr. No.</th>
                <th width="15%">Student Name</th>
                <th width="10%">Roll no.</th>
                <th width="10%">DOB</th>
                <th width="15%">Address</th>
                <th width="15%">Father's Name</th>
                <th width="15%">Mother's Name</th>
                <th width="7%">Class</th>
                <th width="7%">Course</th>
            </tr>

            <script>
                let userInput = prompt("Enter Number of students:", "10");
                let totalStudents = parseInt(userInput);
                for (let i = 1; i <= totalStudents; i++) {
                    document.write(`
                        <tr style="height: 35px;">
                            <td>${i}</td>
                            <td>&nbsp;</td>
                            <td>&nbsp;</td>
                            <td>&nbsp;</td>
                            <td>&nbsp;</td>
                            <td>&nbsp;</td>
                            <td>&nbsp;</td>
                            <td>&nbsp;</td>
                            <td>&nbsp;</td>
                        </tr>
                    `);
                }
            </script>
        </table>
    </center>
</body>
</html>
