<body>
	<p>A form with a password field that must contain 8 or <br> more charecters that are of at least one number, <br> and one uppercase and lowercase letter.</p>

	<form>
		password:<input type="password" name="pw" pattern="(*\d)(?=*[a-z])(?=*[A-Z]){8}" title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more charecters"><br><br>

		<input type="submit">
	</form>

</body>
