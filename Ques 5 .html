<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indian Railway Timetable </title>

    <style>
        #trainTable {
            border-collapse: collapse; 
            width: 80%;  
            margin: auto; 
            text-align: center;
        }
        
        th, td {
            padding: 10px; 
        }

        th {
            background-color: lightpink;
        }
    </style>
</head>
<body>

    <h2 style="text-align: center;">Indian Railways Timetable</h2>

    <table border="1" id="trainTable">
        
        <tr>
            <th rowspan="2">Train Number</th>
            <th rowspan="2">Train Name</th>
            
            <th colspan="2">Timing</th>
        </tr>
        
        <tr>
            <th>Arrival</th>
            <th>Departure</th>
        </tr>

        <tr>
            <td>15004</td>
            <td>Chauri Chaura Express</td>
            <td>5:30 AM</td>
            <td>5:45 AM</td>
        </tr>

        <tr>
            <td>15159</td>
            <td>Sarnath Express</td>
            <td>6:50 AM</td>
            <td>7:15 AM</td>
        </tr>

        <tr>
            <td>19877</td>
            <td>Chennai Express</td>
            <td>8:00 AM</td>
            <td>8:30 AM</td>
        </tr>

    </table>

</body>
</html>
